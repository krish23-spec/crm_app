<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CRM Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>CRM Pro</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/leads" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Leads</span>
                </a>
                <a href="/analytics" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <div class="nav-divider"></div>
                <button id="darkModeToggle" class="nav-item">
                    <i class="fas fa-moon"></i>
                    <span>Dark Mode</span>
                </button>
                <button id="logoutBtn" class="nav-item logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search leads...">
                </div>
                <div class="user-info">
                    <span id="userName"></span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </header>
            
            <div class="content-wrapper">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <i class="fas fa-user-plus"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalLeads">0</h3>
                            <p>Total Leads</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <i class="fas fa-phone-alt"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalOutreach">0</h3>
                            <p>Total Outreach</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <i class="fas fa-handshake"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="dealsClosed">0</h3>
                            <p>Deals Closed</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <i class="fas fa-rupee-sign"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalRevenue">₹0</h3>
                            <p>Revenue Generated</p>
                        </div>
                    </div>
                </div>
                
                <!-- Charts Row -->
                <div class="charts-row">
                    <div class="chart-card">
                        <h3>Monthly Performance</h3>
                        <canvas id="monthlyChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>Lead Status Distribution</h3>
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
                
                <!-- Reminders Section -->
                <div class="reminders-section">
                    <div class="section-header">
                        <h3><i class="fas fa-bell"></i> Upcoming Reminders</h3>
                        <button id="refreshReminders" class="btn-icon"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    <div id="remindersList" class="reminders-list">
                        <div class="loading">Loading reminders...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
