<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Management | CRM Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-chart-line"></i><span>CRM Pro</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
                <a href="/leads" class="nav-item active"><i class="fas fa-users"></i><span>Leads</span></a>
                <a href="/analytics" class="nav-item"><i class="fas fa-chart-bar"></i><span>Analytics</span></a>
                <div class="nav-divider"></div>
                <button id="darkModeToggle" class="nav-item"><i class="fas fa-moon"></i><span>Dark Mode</span></button>
                <button id="logoutBtn" class="nav-item logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search leads..."></div>
                <div class="user-info"><span id="userName"></span><i class="fas fa-user-circle"></i></div>
            </header>
            
            <div class="content-wrapper">
                <div class="page-header">
                    <h2>Lead Management</h2>
                    <button id="addLeadBtn" class="btn-primary"><i class="fas fa-plus"></i> Add Lead</button>
                </div>
                
                <div class="filters-bar">
                    <select id="statusFilter">
                        <option value="all">All Status</option>
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Interested">Interested</option>
                        <option value="Not Interested">Not Interested</option>
                        <option value="Closed (Won)">Closed (Won)</option>
                        <option value="Closed (Lost)">Closed (Lost)</option>
                    </select>
                    <select id="countryFilter">
                        <option value="all">All Countries</option>
                        <option value="India">India</option>
                        <option value="International">International</option>
                    </select>
                    <button id="exportCSVBtn" class="btn-secondary"><i class="fas fa-download"></i> Export CSV</button>
                </div>
                
                <div id="leadsTable" class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr><th>Name</th><th>Country</th><th>Email</th><th>Business</th><th>Status</th><th>Outreach</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="leadsList"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Add/Edit Lead Modal -->
    <div id="leadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="modalTitle">Add New Lead</h3><span class="close">&times;</span></div>
            <form id="leadForm">
                <input type="hidden" id="leadId">
                <div class="form-row"><div class="form-group"><label>Name *</label><input type="text" id="leadName" required></div>
                <div class="form-group"><label>Country</label><select id="leadCountry"><option>India</option><option>International</option></select></div></div>
                <div class="form-row"><div class="form-group"><label>Email</label><input type="email" id="leadEmail"></div>
                <div class="form-group"><label>Phone</label><input type="text" id="leadPhone"></div></div>
                <div class="form-row"><div class="form-group"><label>Business Type</label><input type="text" id="leadBusiness" placeholder="Doctor, Salon, Retail, etc"></div>
                <div class="form-group"><label>Source</label><select id="leadSource"><option>Instagram</option><option>Google</option><option>Referral</option><option>Other</option></select></div></div>
                <div class="form-group"><label>Status</label><select id="leadStatus"><option>New</option><option>Contacted</option><option>Interested</option><option>Not Interested</option><option>Closed (Won)</option><option>Closed (Lost)</option></select></div>
                <div class="form-group"><label>Notes</label><textarea id="leadNotes" rows="3"></textarea></div>
                <div class="form-actions"><button type="button" class="btn-secondary close-modal">Cancel</button><button type="submit" class="btn-primary">Save Lead</button></div>
                <div id="amountField" style="display:none;"><label>Deal Amount (₹)</label><input type="number" id="leadAmount" placeholder="Enter amount"></div>
            </form>
        </div>
    </div>
    
    <script src="/js/common.js"></script>
    <script src="/js/leads.js"></script>
</body>
</html>
